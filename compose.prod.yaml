# compose.prod.yaml — 生产环境
# 启动: docker compose -f compose.prod.yaml up -d
# 使用多阶段 Dockerfile 构建，Nginx 反代 + JRE 瘦镜像

services:
  frontend:
    build: ./frontend
    restart: unless-stopped
    ports:
      - '80:80'
    depends_on:
      backend:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:80"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 10s

  backend:
    build: ./backend/teamplatform
    restart: unless-stopped
    ports:
      - '8080:8080'
    environment:
      SPRING_DATASOURCE_URL: jdbc:mysql://db:3306/teamplatform?useUnicode=true&characterEncoding=utf-8&serverTimezone=Asia/Shanghai&useSSL=false
      SPRING_DATASOURCE_USERNAME: root
      SPRING_DATASOURCE_PASSWORD_FILE: /run/secrets/db_password
    depends_on:
      db:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:8080/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 60s
    secrets:
      - db_password
    deploy:
      resources:
        limits:
          memory: 512M

  db:
    image: mysql:8.0
    restart: unless-stopped
    environment:
      MYSQL_DATABASE: teamplatform
      MYSQL_ROOT_PASSWORD_FILE: /run/secrets/db_password
    volumes:
      - mysql-data:/var/lib/mysql
    healthcheck:
      test: ["CMD-SHELL", "mysqladmin ping -h localhost -u root -p$$(cat /run/secrets/db_password)"]
      interval: 5s
      timeout: 5s
      retries: 10
      start_period: 30s
    secrets:
      - db_password

volumes:
  mysql-data:

secrets:
  db_password:
    file: ./secrets/db_password.txt
