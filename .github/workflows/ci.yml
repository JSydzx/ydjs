name: Full Stack CI

on:
  push:
    branches: ["main", "master", "develop"]
  pull_request:
    branches: ["main"]
  workflow_dispatch:

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  # 1 Spring Boot
  backend-java:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: backend/teamplatform
    steps:
      - name: Checkout
        uses: actions/checkout@v6
      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17"
          cache: maven
      - name: Make mvnw executable
        run: chmod +x mvnw
      - name: Run tests
        run: ./mvnw -B -ntp test

  #  Python 
  # backend-python:
  #   runs-on: ubuntu-latest
  #   steps:
  #     - uses: actions/checkout@v6
  #     - uses: actions/setup-python@v5
  #       with:
  #         python-version: '3.12'
  #         cache: 'pip'
  #     - run: pip install -r backend/requirements.txt pytest coverage ruff
  #     - run: ruff check backend/
  #     - run: coverage run -m pytest backend/tests && coverage xml

  # 3 前端
  frontend:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-node@v4
        with:
          node-version: "24"
          cache: "npm"
          cache-dependency-path: frontend/package-lock.json
      - run: npm ci --prefix frontend
      - run: npm run lint --prefix frontend
      - run: npm test --prefix frontend